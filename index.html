<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صيدلية بعثة الحج الكويتية - نسخة الأطباء</title>
<style>
:root {
  --primary:#0f4c81; --primary-dark:#082f52; --accent:#19a7ce;
  --bg:#f3f7fb; --card:#ffffff; --text:#172033; --muted:#6b7280; --border:#e5e7eb;
}
* { box-sizing:border-box; }
body { margin:0; font-family:Arial,Tahoma,sans-serif; background:linear-gradient(135deg,#eaf4ff,#f8fbff); color:var(--text); min-height:100vh; }
.login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; background:radial-gradient(circle at top right, rgba(25,167,206,.25), transparent 35%), linear-gradient(135deg,#0f4c81,#082f52); }
.login-card { width:100%; max-width:420px; background:rgba(255,255,255,.96); border-radius:28px; padding:28px; box-shadow:0 25px 70px rgba(0,0,0,.25); text-align:center; }
.login-card h1 { margin:0; color:var(--primary-dark); font-size:23px; line-height:1.6; }
.login-card p { color:var(--muted); margin:12px 0 22px; }
.password-row { display:flex; gap:8px; }
input, select, button { width:100%; min-height:50px; border:1px solid var(--border); border-radius:16px; padding:0 14px; font-size:16px; outline:none; background:white; }
input:focus, select:focus { border-color:var(--accent); box-shadow:0 0 0 4px rgba(25,167,206,.12); }
button { background:var(--primary); color:white; border:none; font-weight:800; cursor:pointer; padding:0 18px; }
button:hover { background:var(--primary-dark); }
.error { display:none; margin-top:12px; color:#b91c1c; font-weight:700; font-size:14px; }
.app { display:none; }
.page { width:100%; max-width:1180px; margin:0 auto; padding:18px; }
.header { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; border-radius:28px; padding:24px 18px; text-align:center; box-shadow:0 18px 42px rgba(15,76,129,.22); margin-bottom:14px; }
.header h1 { margin:0; font-size:25px; line-height:1.6; font-weight:900; }
.header p { margin:8px 0 0; opacity:.9; font-size:14px; }
.toolbar { position:sticky; top:0; z-index:50; background:rgba(243,247,251,.94); backdrop-filter:blur(14px); border:1px solid rgba(229,231,235,.9); border-radius:22px; box-shadow:0 12px 30px rgba(15,76,129,.12); padding:12px; margin-bottom:14px; }
.controls { display:grid; grid-template-columns:2fr 1fr auto; gap:10px; align-items:center; }
.stats { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; color:var(--muted); font-size:13px; }
.badge { background:white; border:1px solid var(--border); padding:8px 12px; border-radius:999px; }
.cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; }
.med-card { background:var(--card); border:1px solid var(--border); border-radius:24px; padding:16px; box-shadow:0 12px 28px rgba(15,76,129,.10); transition:.18s ease; direction:ltr; text-align:left; }
.med-card:hover { transform:translateY(-2px); box-shadow:0 16px 34px rgba(15,76,129,.16); }
.med-title { font-size:17px; font-weight:900; color:var(--primary-dark); margin-bottom:10px; line-height:1.4; }
.med-generic { font-size:14px; color:#374151; line-height:1.5; margin-bottom:12px; }
.card-meta { display:flex; gap:8px; flex-wrap:wrap; }
.pill { display:inline-flex; align-items:center; gap:6px; background:#ecfdf5; color:#065f46; border:1px solid #ccfbf1; padding:7px 10px; border-radius:999px; font-size:12.5px; font-weight:800; }
.empty { display:none; text-align:center; color:var(--muted); background:white; border:1px dashed var(--border); border-radius:22px; padding:30px; margin-top:10px; }
.footer-note { text-align:center; margin-top:35px; font-size:10.5px; opacity:.30; color:#111827; }
@media (max-width:800px) { .page{padding:10px;} .header{border-radius:22px;padding:20px 12px;} .header h1{font-size:19px;} .controls{grid-template-columns:1fr;} .toolbar{border-radius:18px;padding:10px;} .cards-grid{grid-template-columns:1fr;gap:10px;} .med-card{border-radius:20px;padding:14px;} .med-title{font-size:16px;} .login-card{padding:22px;border-radius:24px;} .password-row{flex-direction:column;} }
@media (max-width:480px) { .header h1{font-size:17px;} .header p{font-size:12px;} .med-title{font-size:15px;} .med-generic{font-size:13px;} .pill{font-size:12px;} }
</style>
</head>
<body>
<section id="loginScreen" class="login-screen">

    <h1>صيدلية بعثة الحج الكويتية<br><span style="font-size:0.9em;font-weight:700;">سنة 2026م</span></h1>

</section>
<main id="app" class="app">

      <p>نسخة الأطباء - بدون أرقام الصناديق</p>
    </header>
    <section class="toolbar">
      <div class="controls">
        <input id="searchInput" type="search" placeholder="Search trade name, generic name, or type...">
        <select id="typeFilter"><option value="">All Types</option></select>
        <button type="button" id="clearBtn">Clear</button>

      <div class="stats">

    </section>
    <section id="cardsGrid" class="cards-grid"></section>
    <div id="emptyState" class="empty">No matching results found</div>
    <div class="footer-note">Prepared by Ph. Talal Alenezi</div>
  </div>
</main>

const searchableColumns = ["Trade name", "Generic Name", "Type"];

const loginScreen = document.getElementById('loginScreen');
const app = document.getElementById('app');
const passwordInput = document.getElementById('passwordInput');
const loginError = document.getElementById('loginError');
const searchInput = document.getElementById('searchInput');
const typeFilter = document.getElementById('typeFilter');
const cardsGrid = document.getElementById('cardsGrid');
const emptyState = document.getElementById('emptyState');
const totalCount = document.getElementById('totalCount');
const shownCount = document.getElementById('shownCount');
const openBtn = document.getElementById('openBtn');
const clearBtn = document.getElementById('clearBtn');

function safeText(value) {
  return String(value ?? '').replace(/[&<>"']/g, function(match) {
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[match];
  });
}

function openApp() {
  loginScreen.style.display = 'none';
  app.style.display = 'block';
  sessionStorage.setItem('pharmaHajDoctorsAccess', 'yes');
  setTimeout(() => searchInput.focus(), 50);
}

function checkPassword() {
  if (passwordInput.value === APP_PASSWORD) {
    openApp();
  } else {
    loginError.style.display = 'block';
    passwordInput.select();
  }
}

function populateFilters() {
  const types = [...new Set(records.map(r => r['Type']).filter(Boolean))].sort();
  types.forEach(type => {
    const opt = document.createElement('option');
    opt.value = type;
    opt.textContent = type;
    typeFilter.appendChild(opt);
  });
}

function renderCards(data) {
  cardsGrid.innerHTML = data.map(row => {
    const trade = safeText(row['Trade name']);
    const generic = safeText(row['Generic Name']);
    const type = safeText(row['Type']);
    return `<article class="med-card">
      <div class="med-title">${trade || 'Unnamed Medicine'}</div>
      <div class="med-generic">${generic || '&nbsp;'}</div>
      <div class="card-meta"><span class="pill">Type: ${type || '-'}</span></div>
    </article>`;
  }).join('');
  shownCount.textContent = data.length;
  emptyState.style.display = data.length === 0 ? 'block' : 'none';
}

function applyFilters() {
  const query = searchInput.value.trim().toLowerCase();
  const selectedType = typeFilter.value;
  const filtered = records.filter(row => {
    const rowText = searchableColumns.map(col => String(row[col] ?? '')).join(' ').toLowerCase();
    const matchesSearch = !query || rowText.includes(query);
    const matchesType = !selectedType || String(row['Type'] ?? '') === selectedType;
    return matchesSearch && matchesType;
  });
  renderCards(filtered);
}

function clearFilters() {
  searchInput.value = '';
  typeFilter.value = '';
  applyFilters();
}

openBtn.addEventListener('click', checkPassword);
passwordInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') checkPassword(); });
searchInput.addEventListener('input', applyFilters);
typeFilter.addEventListener('change', applyFilters);
clearBtn.addEventListener('click', clearFilters);

totalCount.textContent = records.length;
populateFilters();
renderCards(records);
if (sessionStorage.getItem('pharmaHajDoctorsAccess') === 'yes') openApp();
</script>
